<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container" style="max-width: 700px;">
    <div class="page-header"><h2>Wallet</h2></div>
    <div id="alert-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>

    <div id="wallet-summary"><p class="subtitle">Loading…</p></div>

    <div class="list-card">
      <h4>Buy more credits</h4>
      <div class="field"><label>Credits</label><input id="credits-input" type="number" min="1" value="10" /></div>
      <button id="purchase-btn" class="btn-primary" style="width:auto; padding:0.5rem 1.25rem;">Purchase</button>
    </div>

    <div class="list-card">
      <h4>Freeze / Resume</h4>
      <div class="field"><label>Freeze effective date</label><input id="freeze-date" type="date" /></div>
      <div class="field"><label>Reason (optional)</label><input id="freeze-reason" type="text" /></div>
      <div style="display:flex; gap:0.5rem;">
        <button id="freeze-btn" class="btn-secondary">Freeze wallet</button>
        <button id="resume-btn" class="btn-secondary">Resume / cancel freeze</button>
      </div>
    </div>

    <h3>Transaction history</h3>
    <div id="transactions"><p class="subtitle">Loading…</p></div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/wallet.js"></script>
</body>
</html>
