<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Children — CodeGurukul Parent Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container">
    <div id="alert-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>

    <div id="consent-section"></div>

    <div class="page-header"><h2>My Children</h2></div>
    <div id="children-list"><p class="subtitle">Loading…</p></div>

    <div id="child-detail" class="hidden">
      <button id="back-btn" class="btn-secondary" style="margin-bottom:1rem;">← Back</button>
      <h2 id="child-name"></h2>

      <div class="tabs">
        <button data-tab="overview" class="active">Overview</button>
        <button data-tab="attendance">Attendance</button>
        <button data-tab="recordings">Recordings</button>
        <button data-tab="wallet">Wallet</button>
        <button data-tab="reports">Reports</button>
      </div>

      <div id="tab-overview"></div>
      <div id="tab-attendance" class="hidden"></div>
      <div id="tab-recordings" class="hidden"></div>
      <div id="tab-wallet" class="hidden"></div>
      <div id="tab-reports" class="hidden"></div>
    </div>
  </div>

  <div id="otp-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Verify it's you</h3>
      <p class="subtitle">A verification code has been sent (check the server log in this dev build — no SMS/WhatsApp gateway is configured).</p>
      <div class="field"><label>Code</label><input id="otp-input" type="text" /></div>
      <div style="display:flex; gap:0.5rem;">
        <button id="verify-otp-btn" class="btn-primary" style="width:auto; padding:0.5rem 1.25rem;">Verify</button>
        <button id="close-otp-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/parent-dashboard.js"></script>
</body>
</html>
