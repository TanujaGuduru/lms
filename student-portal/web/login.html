<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="center-screen">
    <form class="card" id="login-form" autocomplete="on">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your CodeGurukul student/parent account.</p>

      <div id="alert-box" class="alert alert-error hidden"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Sign in</button>
    </form>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
