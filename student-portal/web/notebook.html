<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notebook — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container">
    <div class="page-header">
      <h2>Notebook</h2>
      <button id="new-note-btn" class="btn-secondary">+ New note</button>
    </div>

    <div id="alert-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>
    <div id="notes-list"><p class="subtitle">Loading…</p></div>
  </div>

  <div id="editor-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="field">
        <label>Title</label>
        <input id="note-title" type="text" placeholder="Untitled" />
      </div>
      <div class="field">
        <label>Content</label>
        <textarea id="note-content" rows="10" placeholder="Write your notes here…"></textarea>
      </div>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom: 1rem;">
        <button id="save-note-btn" class="btn-primary" style="width:auto; padding: 0.5rem 1.25rem;">Save</button>
        <button id="summarize-btn" class="btn-secondary">AI summarize</button>
        <button id="flashcards-btn" class="btn-secondary">Make flashcards</button>
        <button id="quiz-btn" class="btn-secondary">Generate practice quiz</button>
        <button id="delete-note-btn" class="btn-danger" style="margin-left:auto;">Delete</button>
      </div>
      <div id="ai-result" class="hidden"></div>
      <button id="close-editor-btn" class="btn-secondary" style="width:100%; margin-top:0.5rem;">Close</button>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/notebook.js"></script>
</body>
</html>
