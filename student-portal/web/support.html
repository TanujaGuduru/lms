<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container">
    <div class="page-header">
      <h2>Support</h2>
      <button id="new-ticket-btn" class="btn-secondary">+ New ticket</button>
    </div>
    <div id="alert-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>

    <div id="list-panel"><p class="subtitle">Loading…</p></div>

    <div id="new-ticket-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <h3>New support ticket</h3>
        <div class="field"><label>Category</label><select id="category-select"></select></div>
        <div class="field"><label>Subject</label><input id="ticket-subject" type="text" /></div>
        <div class="field"><label>Description</label><textarea id="ticket-description" rows="5"></textarea></div>
        <div style="display:flex; gap:0.5rem;">
          <button id="create-ticket-btn" class="btn-primary" style="width:auto; padding:0.5rem 1.25rem;">Submit ticket</button>
          <button id="close-new-ticket-btn" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <div id="detail-panel" class="hidden">
      <button id="back-btn" class="btn-secondary" style="margin-bottom:1rem;">← Back to list</button>
      <div class="list-card">
        <h3 id="t-subject"></h3>
        <p class="subtitle" id="t-meta"></p>
        <p id="t-description"></p>
      </div>
      <div id="replies-list"></div>
      <div class="list-card">
        <div class="field"><label>Reply</label><textarea id="reply-message" rows="3"></textarea></div>
        <button id="send-reply-btn" class="btn-primary" style="width:auto; padding:0.5rem 1.25rem;">Send reply</button>
      </div>
      <div id="satisfaction-panel" class="list-card hidden">
        <p>How satisfied were you with the resolution?</p>
        <div id="rating-stars"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/support.js"></script>
</body>
</html>
