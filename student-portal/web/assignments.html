<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container">
    <div class="page-header"><h2>Assignments</h2></div>
    <div id="alert-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>

    <div id="list-panel"><p class="subtitle">Loading…</p></div>

    <div id="detail-panel" class="hidden">
      <button id="back-btn" class="btn-secondary" style="margin-bottom:1rem;">← Back to list</button>
      <div class="list-card">
        <h3 id="a-title"></h3>
        <p class="subtitle" id="a-meta"></p>
        <p id="a-description"></p>

        <div class="field"><label>Written response / notes</label><textarea id="f-text" rows="6"></textarea></div>
        <div class="field"><label>Link / URL</label><input id="f-url" type="text" placeholder="https://…" /></div>
        <div class="field"><label>GitHub repo URL</label><input id="f-github" type="text" placeholder="https://github.com/…" /></div>
        <div class="field"><label>Demo video URL</label><input id="f-video" type="text" placeholder="https://…" /></div>

        <div style="display:flex; gap:0.5rem;">
          <button id="save-draft-btn" class="btn-secondary">Save draft</button>
          <button id="submit-btn" class="btn-primary" style="width:auto; padding:0.55rem 1.25rem;">Submit</button>
        </div>
        <p class="subtitle" id="submission-status" style="margin-top:0.75rem;"></p>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/assignments.js"></script>
</body>
</html>
