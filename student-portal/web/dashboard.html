<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CodeGurukul Student Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">CodeGurukul</span>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="container">
    <div id="hero-section">
      <div class="hero-banner">
        <div style="flex:1;min-width:200px">
          <div class="skeleton skeleton-text medium" style="height:1.4rem;background:rgba(255,255,255,0.25)"></div>
          <div class="skeleton skeleton-text short" style="background:rgba(255,255,255,0.2)"></div>
        </div>
      </div>
    </div>

    <div id="stats-section" class="stat-grid">
      <div class="stat-tile"><div class="skeleton skeleton-text short" style="margin:0 auto"></div></div>
      <div class="stat-tile"><div class="skeleton skeleton-text short" style="margin:0 auto"></div></div>
      <div class="stat-tile"><div class="skeleton skeleton-text short" style="margin:0 auto"></div></div>
    </div>

    <div id="alert-box" class="alert alert-error hidden"></div>

    <div style="margin-top: 2rem;">
      <h3>Upcoming classes</h3>
      <div id="upcoming-classes">
        <div class="skeleton skeleton-block"></div>
        <div class="skeleton skeleton-block"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
